name: CI

on:
  push:
  pull_request:

jobs:
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: discord-part/requirements-dev.txt
      - run: python -m pip install -r discord-part/requirements-dev.txt
      - run: python -m pytest -q
      - run: python -m ruff check discord-part shared
      - run: python -m compileall -q discord-part shared

  website:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: website-part
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website-part/package-lock.json
      - run: npm ci
      - run: npm run check
