<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiuLianBot - R6 Roller</title>
  <link rel="stylesheet" href="/css/style.css?v=20260722-3">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🎮 LiuLianBot</div>
    <div class="nav-links">
      <a href="/index.html" class="nav-link">Home</a>
      <a href="/roller.html" class="nav-link active">R6 Roller</a>
      <a href="/account.html" class="nav-link">Account</a>
      <a href="/admin.html" class="nav-link admin-only" style="display:none;">Admin</a>
    </div>
    <div class="nav-user" id="navUser">
      <span id="logoutStatus" class="nav-auth-status" role="status" aria-live="polite">Loading account...</span>
    </div>
  </nav>

  <main class="main-content">
    <div class="roller-container" data-tabs>
      <h2>🎲 R6 Roller</h2>

      <div class="roller-tabs" role="tablist" aria-label="Roll type">
        <button id="operator-tab" class="tab-btn active" type="button" role="tab" data-tab="operator"
          aria-controls="operatorTab" aria-selected="true" tabindex="0">Operator Roll</button>
        <button id="map-tab" class="tab-btn" type="button" role="tab" data-tab="map"
          aria-controls="mapTab" aria-selected="false" tabindex="-1">Map Roll</button>
      </div>

      <!-- Operator Roller -->
      <div id="operatorTab" class="roller-tab active" role="tabpanel" aria-labelledby="operator-tab">
        <div class="roller-controls">
          <label>
            <input type="radio" name="opSide" value="" checked> Both Sides
          </label>
          <label>
            <input type="radio" name="opSide" value="att"> Attacker Only
          </label>
          <label>
            <input type="radio" name="opSide" value="def"> Defender Only
          </label>
          <button id="rollOpBtn" class="btn btn-primary btn-roll">🎯 Roll Operator</button>
        </div>

        <div id="opResult" class="roll-result">
          <div class="result-placeholder">
            <p>Click "Roll Operator" to get started!</p>
          </div>
        </div>

        <div id="opHistory" class="roll-history">
          <h3>History</h3>
          <div id="opHistoryList"></div>
        </div>
      </div>

      <!-- Map Roller -->
      <div id="mapTab" class="roller-tab" role="tabpanel" aria-labelledby="map-tab" hidden>
        <div class="roller-controls">
          <button id="rollMapBtn" class="btn btn-primary btn-roll">🗺️ Roll Map</button>
        </div>

        <div id="mapResult" class="roll-result">
          <div class="result-placeholder">
            <p>Click "Roll Map" to get started!</p>
          </div>
        </div>

        <div id="mapHistory" class="roll-history">
          <h3>History</h3>
          <div id="mapHistoryList"></div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/js/app.mjs"></script>
  <script type="module" src="/js/roller.mjs"></script>
</body>
</html>
