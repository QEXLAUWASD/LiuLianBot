<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiuLianBot - Login</title>
  <link rel="stylesheet" href="/css/style.css?v=20260722-4">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card" data-tabs>
      <h1>🎮 LiuLianBot</h1>
      <p class="subtitle">R6 Roller System</p>

      <div class="auth-tabs" role="tablist" aria-label="Account access">
        <button id="login-tab" class="tab-btn active" type="button" role="tab" data-tab="login"
          aria-controls="loginForm" aria-selected="true" tabindex="0">Login</button>
        <button id="register-tab" class="tab-btn" type="button" role="tab" data-tab="register"
          aria-controls="registerForm" aria-selected="false" tabindex="-1">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form active" role="tabpanel" aria-labelledby="login-tab">
        <div class="form-group">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required minlength="6" autocomplete="current-password">
        </div>
        <label class="remember-row" for="rememberLogin">
          <input type="checkbox" id="rememberLogin">
          <span>Remember me for 30 days</span>
        </label>
        <div class="error-msg" id="loginError"></div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" role="tabpanel" aria-labelledby="register-tab" hidden>
        <div class="form-group">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" placeholder="3-20 characters" required minlength="3" maxlength="20" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="6-128 characters" required minlength="6" maxlength="128" autocomplete="new-password">
        </div>
        <div class="error-msg" id="regError"></div>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
    </div>
  </div>

  <script type="module" src="/js/auth.mjs?v=20260723-1"></script>
</body>
</html>
